<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYA Bicol — Daily Verse</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --deep: #1a1035;
      --mid: #2d1f5e;
      --text: #f5f0e8;
      --muted: #b0a8c4;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--deep) 0%, var(--mid) 50%, #1e3a5f 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Subtle star/particle background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 40%, rgba(201,168,76,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .cross-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
    }

    .org-name {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
    }

    h1 span {
      color: var(--gold-light);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* Verse card */
    .verse-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .verse-card::before {
      content: '\201C';
      position: absolute;
      top: -20px;
      left: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 10rem;
      color: rgba(201, 168, 76, 0.08);
      line-height: 1;
      pointer-events: none;
    }

    .verse-card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .verse-card.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .verse-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-style: italic;
      line-height: 1.7;
      color: var(--text);
    }

    .verse-ref {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 6px 16px;
      border: 1px solid rgba(201, 168, 76, 0.35);
      border-radius: 999px;
    }

    .placeholder-text {
      color: var(--muted);
      font-size: 1rem;
      font-style: italic;
    }

    /* Button */
    .btn-verse {
      background: linear-gradient(135deg, var(--gold) 0%, #a87c2a 100%);
      color: #1a1035;
      border: none;
      border-radius: 999px;
      padding: 16px 48px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 24px rgba(201, 168, 76, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-verse::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-verse:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201, 168, 76, 0.55);
      filter: brightness(1.08);
    }

    .btn-verse:hover:not(:disabled)::after { opacity: 1; }

    .btn-verse:active:not(:disabled) {
      transform: translateY(0px);
      box-shadow: 0 2px 12px rgba(201, 168, 76, 0.3);
    }

    .btn-verse:disabled {
      background: linear-gradient(135deg, #5a5060 0%, #3a3045 100%);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Daily limit indicator */
    .limit-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .verse-dots {
      display: flex;
      gap: 8px;
    }

    .verse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(201, 168, 76, 0.5);
      background: transparent;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .verse-dot.used {
      background: var(--gold);
      border-color: var(--gold);
    }

    .limit-text {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    .limit-text.exhausted {
      color: var(--gold-light);
    }

    /* Share row */
    .share-row {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
      pointer-events: none;
    }

    .share-row.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .share-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-copy {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-copy:hover {
      background: rgba(201, 168, 76, 0.15);
      border-color: rgba(201, 168, 76, 0.4);
    }

    .btn-copy.copied {
      color: var(--gold-light);
      border-color: rgba(201, 168, 76, 0.6);
    }

    /* Footer */
    footer {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
  </style>
</head>

  const DAILY_LIMIT = 2;
  const STORAGE_KEY = 'cyaBicolVerse';

  function getTodayKey() {
    return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { date: null, count: 0, lastIndex: -1, lastVerse: null };
      return JSON.parse(raw);
    } catch { return { date: null, count: 0, lastIndex: -1, lastVerse: null }; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getEffectiveState() {
    const state = loadState();
    const today = getTodayKey();
    if (state.date !== today) {
      return { date: today, count: 0, lastIndex: -1, lastVerse: null };
    }
    return state;
  }

  let currentVerse = null;

  function updateUI(count) {
    const btn = document.getElementById('verseBtn');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');
    const limitText = document.getElementById('limitText');
    const remaining = DAILY_LIMIT - count;

    dot1.classList.toggle('used', count >= 1);
    dot2.classList.toggle('used', count >= 2);

    if (remaining <= 0) {
      btn.disabled = true;
      btn.textContent = '✦ Come Back Tomorrow';
      limitText.textContent = "You've received both verses for today. See you tomorrow!";
      limitText.classList.add('exhausted');
    } else {
      btn.disabled = false;
      btn.textContent = '✦ Daily Verse';
      limitText.textContent = remaining === DAILY_LIMIT
        ? `${remaining} verses remaining today`
        : `${remaining} verse remaining today`;
      limitText.classList.remove('exhausted');
    }
  }

        <span class="verse-ref">${verse.ref}</span>
      `;
      card.classList.remove('fade-out');
      card.classList.add('fade-in');
      document.getElementById('shareRow').classList.add('visible');
      resetCopyBtn();
    }, 380);
  }

  function showVerse() {
    const state = getEffectiveState();
    if (state.count >= DAILY_LIMIT) return;

    let idx;
    do { idx = Math.floor(Math.random() * verses.length); } while (idx === state.lastIndex);

    currentVerse = verses[idx];
    state.count += 1;
    state.lastIndex = idx;
    state.lastVerse = currentVerse;
    saveState(state);

    renderVerse(currentVerse);
    updateUI(state.count);
  }

  function copyVerse() {
    if (!currentVerse) return;
    const text = `"${currentVerse.text}" — ${currentVerse.ref}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(resetCopyBtn, 2000);
    });
  }

  function resetCopyBtn() {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copy verse';
    btn.classList.remove('copied');
  }

  // On load: restore state
  (function init() {
    const state = getEffectiveState();
    updateUI(state.count);
    if (state.lastVerse) {
      currentVerse = state.lastVerse;
      // Restore last verse instantly without animation
      const card = document.getElementById('verseCard');
      card.innerHTML = `
        <p class="verse-text">"${state.lastVerse.text}"</p>
        <span class="verse-ref">${state.lastVerse.ref}</span>
      `;
      document.getElementById('shareRow').classList.add('visible');
    }
  })();
</script>

</body>
</html>
