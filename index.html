<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYA Bicol — Daily Verse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4a90d9;
      --accent-light: #7ab3ef;
      --deep: #0a1628;
      --mid: #122a4e;
      --text: #ffffff;
      --muted: #a0b8d8;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--deep) 0%, var(--mid) 50%, #1a3a6b 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Subtle star/particle background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 40%, rgba(74,144,217,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 8px;
      object-fit: contain;
      filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(255,255,255,0.4));
    }

    .org-name {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
    }

    h1 span {
      color: var(--accent-light);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* Verse card */
    .verse-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(74, 144, 217, 0.25);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .verse-card::before {
      content: '\201C';
      position: absolute;
      top: -20px;
      left: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 10rem;
      color: rgba(74, 144, 217, 0.08);
      line-height: 1;
      pointer-events: none;
    }

    .verse-card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .verse-card.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .verse-text {
      font-family: 'Lora', serif;
      font-size: clamp(1.05rem, 3vw, 1.3rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.85;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .verse-ref {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-light);
      padding: 6px 16px;
      border: 1px solid rgba(74, 144, 217, 0.35);
      border-radius: 999px;
    }

    .placeholder-text {
      color: var(--muted);
      font-size: 1rem;
      font-style: italic;
    }

    /* Button */
    .btn-verse {
      background: linear-gradient(135deg, var(--accent) 0%, #2a6ab8 100%);
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 16px 48px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 24px rgba(74, 144, 217, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-verse::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-verse:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(74, 144, 217, 0.55);
      filter: brightness(1.08);
    }

    .btn-verse:hover:not(:disabled)::after { opacity: 1; }

    .btn-verse:active:not(:disabled) {
      transform: translateY(0px);
      box-shadow: 0 2px 12px rgba(74, 144, 217, 0.3);
    }

    /* Daily verse row */
    .limit-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* Share row */
    .share-row {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
      pointer-events: none;
    }

    .share-row.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .share-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .btn-copy {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-copy:hover {
      background: rgba(74, 144, 217, 0.15);
      border-color: rgba(74, 144, 217, 0.4);
    }

    .btn-copy.copied {
      color: var(--accent-light);
      border-color: rgba(74, 144, 217, 0.6);
    }

    /* Footer */
    footer {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    /* ── Responsive: phones (max-width 480px) ── */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }

      .container {
        gap: 24px;
      }

      .cross-icon {
        font-size: 1.6rem;
      }

      .verse-card {
        padding: 28px 20px;
        min-height: 180px;
        border-radius: 16px;
      }

      .verse-card::before {
        font-size: 7rem;
        top: -14px;
        left: 10px;
      }

      .btn-verse {
        padding: 14px 36px;
        font-size: 0.9rem;
        width: 100%;
        max-width: 320px;
      }

      .share-row {
        flex-direction: column;
        gap: 8px;
      }

      .btn-copy {
        padding: 8px 24px;
      }
    }

    /* ── Responsive: small-medium phones (max-width 360px) ── */
    @media (max-width: 360px) {
      body {
        padding: 12px 8px;
      }

      .container {
        gap: 20px;
      }

      .verse-card {
        padding: 22px 16px;
        min-height: 160px;
      }

      .btn-verse {
        padding: 12px 28px;
        font-size: 0.85rem;
      }
    }

    /* ── Responsive: tablets and up (min-width 768px) ── */
    @media (min-width: 768px) {
      body {
        padding: 40px 32px;
      }

      .container {
        gap: 40px;
      }

      .verse-card {
        padding: 48px 44px;
        min-height: 260px;
      }
    }
  </style>
</head>

</div>

  let currentVerse = null;
  let lastIndex = -1;

  function renderVerse(verse) {
    const card = document.getElementById('verseCard');
    card.classList.remove('fade-in');
    card.classList.add('fade-out');
    setTimeout(() => {
      card.innerHTML = `
        <p class="verse-text">"${verse.text}"</p>
        <span class="verse-ref">${verse.ref}</span>
      `;
      card.classList.remove('fade-out');
      card.classList.add('fade-in');
      document.getElementById('shareRow').classList.add('visible');
      resetCopyBtn();
    }, 380);
  }

  function showVerse() {
    let idx;
    do { idx = Math.floor(Math.random() * verses.length); } while (idx === lastIndex);

    currentVerse = verses[idx];
    lastIndex = idx;
    renderVerse(currentVerse);
  }

  function copyVerse() {
    if (!currentVerse) return;
    const text = `"${currentVerse.text}" — ${currentVerse.ref}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(resetCopyBtn, 2000);
    });
  }

  function resetCopyBtn() {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copy verse';
    btn.classList.remove('copied');
  }
</script>
